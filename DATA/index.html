<!DOCTYPE html>
<html>
<head>
    <title>Data</title>
    <link rel="icon" type="image/png" href="Images/Logo.png">
    <link rel="stylesheet" href="Css.css">
</head>

<body>

<div class="loginBox">

    <h2 class="loginTitle">Enter Code</h2>

    <input type="text" id="haslo" class="loginInput" placeholder="Enter Code">

    <br><br>

    <button class="loginButton" onclick="sprawdzHaslo()">Enter</button>

</div>

<script>

function sprawdzHaslo(){

    var wpisaneHaslo = document.getElementById("haslo").value;

    if(wpisaneHaslo === "AW"){
        window.location.href = "../AnomalyWorld/";
    }

    else if(wpisaneHaslo === "ND"){
        window.location.href = "../NoseyData/";
    }

}


// 🔒 BLOKADY

// blokada prawego przycisku myszy
document.addEventListener("contextmenu", function(e){
    e.preventDefault();
});


// blokada klawiszy
document.addEventListener("keydown", function(e){

    if (
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && e.key === "I") ||
        (e.ctrlKey && e.shiftKey && e.key === "J") ||
        (e.ctrlKey && e.key === "U")
    ){
        e.preventDefault();
    }

});

</script>

</body>
</html>
